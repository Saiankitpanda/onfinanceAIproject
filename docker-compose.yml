services:
  clausemark:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_USE_OPENAI: ${AGENT_USE_OPENAI:-0}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  uploads:
  outputs:
